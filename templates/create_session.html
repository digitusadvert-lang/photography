<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session - Photographer Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1>📸 Photographer Portal</h1>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">← Back to Dashboard</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="page-header">
            <h2>Create New Session</h2>
        </div>
        
        <div class="form-container">
            <form method="POST">
                <div class="form-group">
                    <label for="session_name">Session Name *</label>
                    <input type="text" id="session_name" name="session_name" 
                           placeholder="e.g., Wedding - John & Jane" required>
                    <small>A descriptive name for this photo session</small>
                </div>
                
                <div class="form-group">
                    <label for="customer_name">Customer Name *</label>
                    <input type="text" id="customer_name" name="customer_name" 
                           placeholder="e.g., John Smith" required>
                </div>
                
                <div class="form-group">
                    <label for="customer_email">Customer Email (optional)</label>
                    <input type="email" id="customer_email" name="customer_email" 
                           placeholder="customer@example.com">
                    <small>Optional - for your reference</small>
                </div>
                
                <div class="form-actions">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Create Session</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
